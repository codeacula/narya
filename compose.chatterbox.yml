services:
  chatterbox-tts:
    build:
      context: ./tts-service
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - chatterbox-model-cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  streamer-tools:
    environment:
      CHATTERBOX_BASE_URL: http://chatterbox-tts:8008
    depends_on:
      chatterbox-tts:
        condition: service_healthy

volumes:
  chatterbox-model-cache:
